# Serves the static `ask` web surface and reverse-proxies the API to the proxy
# service over the compose network — so the browser sees a single origin
# (no CORS, no proxy code changes). SSE needs buffering OFF and long timeouts.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Image attachments (screenshots, dashboards) are base64 in the JSON body and
    # easily exceed nginx's 1 MB default → a 413 before the request reaches the
    # proxy. Allow generous multimodal uploads.
    client_max_body_size 25m;

    # Docker's embedded DNS. Required because we proxy_pass via a variable
    # (runtime resolution) so nginx can start even before `proxy` is up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # The proxy service, resolvable on the docker-compose network.
    set $proxy_upstream "http://proxy:8765";

    # Don't let the browser cache the app shell — otherwise a rebuilt index.html /
    # app.js / styles.css silently serves stale until a hard reload.
    add_header Cache-Control "no-cache" always;

    # The heavy vendored libs (mermaid ~3MB, etc.) are pinned and rarely change —
    # cache them long. (A location with its own add_header doesn't inherit the
    # server-level one, so this overrides the no-cache above.)
    location /vendor/ {
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Themed error pages (Devy-dark) in place of nginx's bright defaults. These
    # catch nginx-GENERATED errors — a 413 oversize upload, or 502/504 when the
    # backend is down. `proxy_intercept_errors` stays off (default), so JSON error
    # bodies the proxy itself returns pass through untouched. Served internally from
    # /errors/ (self-contained HTML, no external deps — they must render when the
    # backend can't).
    error_page 413 /errors/413.html;
    error_page 500 502 503 504 /errors/50x.html;
    error_page 404 /errors/404.html;
    location ^~ /errors/ { internal; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + health → the LLM-PROXY. Regex location passes the full URI through.
    location ~ ^/(v1|healthz) {
        proxy_pass $proxy_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        # Forward the auth token to the proxy. Behind the SSO edge (Phase B)
        # oauth2-proxy sets `Authorization: Bearer <id_token>`; the proxy verifies
        # it against the IdP JWKS. Explicit so it's never dropped. (Also carries a
        # Grafana-style header if a future edge uses one.)
        proxy_set_header Authorization $http_authorization;

        # Streaming (SSE) essentials.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
