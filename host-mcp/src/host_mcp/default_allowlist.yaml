# Default safe-allowlist for the Agentic DevOps host MCP.
#
# Each check is a fixed argv (or per-platform argv). Arguments can only fill a
# whole {placeholder} token, after passing their constraints — there is NO shell
# and NO arbitrary execution. `profile` is the MINIMUM profile required to expose
# the check; the server runs at one active profile (read-only < diagnostic <
# elevated) and exposes only the checks at or below it.
#
# This is the SecOps boundary: the agent can read host + Docker health, sweep
# logs, and run common diagnostics — but it can never get a shell, and the
# Docker checks are read-only (no run/exec/rm/stop). Mutating or shell-granting
# commands are deliberately absent.

profile: diagnostic

checks:
  # ---- Host: read-only --------------------------------------------------
  disk:
    profile: read-only
    description: "Disk usage per filesystem (df -h)."
    argv: ["df", "-h"]

  memory:
    profile: read-only
    description: "Memory usage."
    platform:
      Linux: ["free", "-h"]
      Darwin: ["vm_stat"]

  cpu_load:
    profile: read-only
    description: "System load averages and uptime."
    argv: ["uptime"]

  os_info:
    profile: read-only
    description: "OS / kernel identification."
    platform:
      Linux: ["uname", "-a"]
      Darwin: ["sw_vers"]

  network:
    profile: read-only
    description: "Listening TCP/UDP sockets — WHICH PORTS are open, no process attribution and no root needed. Answers 'what is this host listening on?' (e.g. is the exporter's port bound). For WHICH PROCESS owns a socket, or to see ESTABLISHED connections to a remote endpoint, use `connections` instead. Cross-OS: `ss -tuln` on Linux, `netstat -an` on macOS."
    platform:
      Linux: ["ss", "-tuln"]
      Darwin: ["netstat", "-an", "-p", "tcp"]

  reboot_history:
    profile: read-only
    description: "Recent reboot / shutdown history (last reboot) — when the host last restarted and whether shutdowns were clean. Portable: `last -n {lines} reboot` on both Linux and macOS."
    argv: ["last", "-n", "{lines}", "reboot"]
    args:
      lines:
        type: int
        default: 10
        min: 1
        max: 100
        description: "Number of recent reboot/shutdown records to return."

  # ---- Host: diagnostic -------------------------------------------------
  processes:
    profile: diagnostic
    description: "A quick ranked list of processes by CPU (pid, ppid, %cpu, %mem, command) — the fast answer to 'what is eating CPU right now?'. Just the process table; no system-wide totals, threads, or state. For a fuller snapshot (load average, memory totals, per-process state/threads) use `top_snapshot`."
    platform:
      Linux: ["ps", "-eo", "pid,ppid,%cpu,%mem,comm", "--sort=-%cpu"]
      Darwin: ["ps", "-Ao", "pid,ppid,%cpu,%mem,comm", "-r"]

  top_snapshot:
    profile: diagnostic
    description: "A one-shot `top` snapshot (not streaming): system-wide load average and memory/CPU totals PLUS the busiest processes with state and thread counts — the broader 'how loaded is this box, and by what?' picture. Heavier than `processes` (which is just a ranked CPU list); use `processes` when you only need to see which command is burning CPU."
    platform:
      Linux: ["top", "-bn1"]
      Darwin: ["top", "-l", "1", "-n", "20"]

  connections:
    profile: diagnostic
    description: "Active network connections WITH the owning process (PID/name) — unlike `network` (listening sockets only, no process attribution), this maps each TCP socket to the process behind it. The way to answer 'which process is talking to that remote endpoint?' — e.g. confirming an agent is actually streaming to a remote host. Cross-OS: `ss -tunap` on Linux, `lsof` on macOS. Full process attribution for other users' sockets may require elevation; your own are always shown."
    platform:
      Linux: ["ss", "-tunap"]
      Darwin: ["lsof", "-nP", "-iTCP", "-sTCP:LISTEN,ESTABLISHED"]

  journal:
    profile: diagnostic
    description: "Recent system log entries — systemd journal on Linux, the unified log (log show) on macOS."
    platform:
      Linux: ["journalctl", "--no-pager", "-n", "{lines}"]
      Darwin: ["log", "show", "--last", "5m", "--style", "compact"]
    args:
      lines:
        type: int
        default: 100
        min: 1
        max: 1000
        description: "Number of recent lines (Linux; on macOS the last few minutes are returned)."

  journal_unit:
    profile: diagnostic
    description: "Recent journal entries for one systemd unit (log sweep; Linux/systemd only)."
    platform:
      Linux: ["journalctl", "--no-pager", "-n", "{lines}", "-u", "{unit}"]
    args:
      unit:
        type: string
        required: true
        pattern: "^[A-Za-z0-9@._-]+$"
        description: "systemd unit, e.g. nginx.service."
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Number of recent lines."

  journal_grep:
    profile: diagnostic
    description: "Search recent system logs for a pattern — journald on Linux, /var/log/system.log on macOS. Pattern is passed as a single argument, never a shell. NOTE: on macOS /var/log/system.log has short retention; for historical or richer queries use log_query (the unified-log store)."
    platform:
      Linux: ["journalctl", "--no-pager", "-n", "{lines}", "--grep", "{pattern}"]
      Darwin: ["grep", "-i", "-m", "{lines}", "-e", "{pattern}", "/var/log/system.log"]
    args:
      pattern:
        type: string
        required: true
        pattern: "^[^\\n]{1,120}$"
        description: "Text/regex to grep for (max 120 chars, single line)."
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Max matching lines to return."

  # ---- Linux journald native filters (indexed, server-side) — the surgical,
  #      cheap way to pull an incident slice on a production host. Linux-only;
  #      macOS uses log_query (below) with a scoped predicate.
  journal_priority:
    profile: diagnostic
    description: "Recent journal entries at or above a severity — e.g. errors only. Filtered server-side by journald (indexed), so it's far cheaper than pulling everything and scanning. Linux/systemd only."
    platform:
      Linux: ["journalctl", "--no-pager", "-p", "{priority}", "-n", "{lines}"]
    args:
      priority:
        type: string
        default: "err"
        enum: ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
        description: "Lowest severity to include (err = errors and worse; warning includes warnings)."
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Max entries to return."

  journal_kernel:
    profile: diagnostic
    description: "Kernel messages only (OOM kills, hardware faults, watchdog, filesystem) from the journal — like dmesg. The first place to look for a crash or resource kill. Linux/systemd only."
    platform:
      Linux: ["journalctl", "--no-pager", "-k", "-n", "{lines}"]
    args:
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Max entries to return."

  journal_boot:
    profile: diagnostic
    description: "Journal entries from a specific boot — default the PREVIOUS boot (-1), filtered to warnings-and-worse — for investigating what happened just before a reboot or crash. Linux/systemd only."
    platform:
      Linux: ["journalctl", "--no-pager", "-b", "{boot}", "-p", "{priority}", "-n", "{lines}"]
    args:
      boot:
        type: string
        default: "-1"
        pattern: "^(0|-[1-9][0-9]?)$"
        description: "Boot offset: 0 = current boot, -1 = previous boot, -2 = two boots ago."
      priority:
        type: string
        default: "warning"
        enum: ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
        description: "Lowest severity to include (default warning keeps the prior-boot slice small)."
      lines:
        type: int
        default: 300
        min: 1
        max: 3000
        description: "Max entries to return."

  # ---- macOS unified log (log show) — the binary store with far longer
  #      retention than /var/log/system.log. Darwin-only by design; Linux hosts
  #      use the journal / journal_* checks above.
  log_query:
    profile: diagnostic
    # `log show` can scan a lot for wide windows, so give it a generous timeout.
    timeout: 90
    description: "Query the macOS unified log store (`log show`) with an NSPredicate over a time window — the authoritative source for shutdown/reboot cause, power, sleep/wake, and kernel events, with much longer retention than /var/log/system.log. macOS only. The predicate is passed as a single argument (no shell). Example predicate for a shutdown investigation: eventMessage CONTAINS[c] \"shutdown\" OR eventMessage CONTAINS[c] \"Previous shutdown cause\" OR eventMessage CONTAINS[c] \"panic\""
    platform:
      Darwin: ["log", "show", "--last", "{window}", "--predicate", "{predicate}", "--style", "compact"]
    args:
      predicate:
        type: string
        required: true
        pattern: "^[^\\n\\r]{1,200}$"
        description: "An NSPredicate filter, e.g. 'eventMessage CONTAINS[c] \"shutdown\"' or 'process == \"kernel\"'. Single line, max 200 chars. Passed as one argument to log show — never a shell."
      window:
        type: string
        default: "1h"
        pattern: "^\\d+[smhd]$"
        description: "How far back to scan, e.g. 30m, 2h, 3d. Wider windows are slower and may time out (the log store is large)."

  panic_reports:
    profile: read-only
    description: "List recent macOS diagnostic reports (kernel panics, crashes) newest-first from /Library/Logs/DiagnosticReports. A *.panic (or *.ips) file dated near a reboot is strong evidence of an unclean shutdown. macOS only."
    platform:
      Darwin: ["ls", "-lt", "/Library/Logs/DiagnosticReports"]

  # ---- Service / daemon management — cross-OS: the systemd service manager on
  #      Linux (RHEL + Ubuntu), launchd on macOS. Same concept ("is this service
  #      running, and if not why did it exit?"), resolved per-OS at runtime.
  services:
    profile: diagnostic
    description: "List services/daemons and their state — the manager's inventory. Cross-OS: `systemctl list-units --type=service` on Linux (systemd; RHEL + Ubuntu), `launchctl list` on macOS (launchd). On macOS the middle column is each job's last exit status and the first its PID (a '-' PID with a non-zero exit = a service that failed to stay up — a crash-loop). The first place to look when a daemon isn't running as expected."
    platform:
      Linux: ["systemctl", "list-units", "--type=service", "--all", "--no-pager", "--no-legend"]
      Darwin: ["launchctl", "list"]

  service_status:
    profile: diagnostic
    description: "Status/detail for ONE named service — including whether it's active and why it last exited. Cross-OS: `systemctl status <name>` on Linux (systemd unit, e.g. nginx.service), `launchctl list <label>` on macOS (launchd job dict with PID + LastExitStatus, e.g. homebrew.mxcl.alloy). The way to diagnose a crash-looping or inactive service after `services` surfaces it."
    platform:
      Linux: ["systemctl", "status", "--no-pager", "{name}"]
      Darwin: ["launchctl", "list", "{name}"]
    args:
      name:
        type: string
        required: true
        pattern: "^[A-Za-z0-9@._-]+$"
        description: "Service identifier — a systemd unit on Linux (nginx.service) or a launchd label on macOS (homebrew.mxcl.alloy)."

  brew_services:
    profile: diagnostic
    description: "Homebrew-managed services and their state (`brew services list`) — started/stopped/error plus the managing user. macOS-idiomatic: many locally-installed agents (Grafana Alloy, databases, exporters) run as Homebrew services rather than raw launchd jobs. macOS only (Homebrew is the common package/service manager on dev Macs; Linux uses systemd)."
    platform:
      Darwin: ["brew", "services", "list"]

  # ---- Scoped log-file read — for a service whose own stdout/stderr is
  #      redirected to a FILE rather than the journal/unified log. On macOS a
  #      launchd/Homebrew service's error output goes to its StandardErrorPath
  #      (visible via `service_status`), which `log show` never captures; the
  #      *reason* a service crash-loops lives there. This is NOT an arbitrary
  #      `cat`: the path is realpath-resolved and rejected unless it lands inside
  #      an allow-listed log directory (no traversal, no symlink escape). Operators
  #      tune `roots` per host — keep them log dirs; never add `/`, a home dir, or a
  #      secrets path, which would defeat the guard.
  tail_file:
    profile: diagnostic
    description: "Read the trailing lines of a specific LOG FILE, restricted to allow-listed log directories (default: /var/log, /opt/homebrew/var/log, /usr/local/var/log, /Library/Logs). Use it to read a service's own error log — e.g. the StandardErrorPath that `service_status` reports for a crash-looping launchd/Homebrew service on macOS (/opt/homebrew/var/log/<svc>.err.log), whose startup error is written to the file, NOT the unified log. On Linux a systemd service's stderr is usually in the journal already — prefer `journal_unit`. The path is realpath-resolved and rejected unless it resolves inside an allow-listed directory: this is a scoped read, never an arbitrary file read, and never a shell."
    argv: ["tail", "-n", "{lines}", "{path}"]
    args:
      path:
        type: path
        required: true
        roots: ["/var/log", "/opt/homebrew/var/log", "/usr/local/var/log", "/Library/Logs"]
        description: "Absolute path to a log file inside an allow-listed log directory, e.g. /opt/homebrew/var/log/alloy.err.log. Rejected if it resolves outside the allowed roots."
      lines:
        type: int
        default: 50
        min: 1
        max: 2000
        description: "Number of trailing lines to read (default 50; the fatal error in a crash log is usually last)."

  # ---- Docker: diagnostic (read-only; requires docker.sock access) ------
  docker_ps:
    profile: diagnostic
    description: "Running containers (name, status, image)."
    argv: ["docker", "ps", "--format", "{{.Names}}\t{{.Status}}\t{{.Image}}"]

  docker_ps_all:
    profile: diagnostic
    description: "All containers including stopped (name, status, image)."
    argv: ["docker", "ps", "-a", "--format", "{{.Names}}\t{{.Status}}\t{{.Image}}"]

  docker_logs:
    profile: diagnostic
    description: "Recent logs for a named container."
    argv: ["docker", "logs", "--tail", "{tail}", "--since", "{since}", "{container}"]
    args:
      container:
        type: string
        required: true
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
        description: "Container name or id."
      since:
        type: string
        default: "15m"
        pattern: "^(\\d+[smhdw]|\\d{4}-\\d{2}-\\d{2}.*)$"
        description: "Time window, e.g. 15m, 1h, 2d."
      tail:
        type: int
        default: 200
        min: 1
        max: 1000
        description: "Max log lines."

  docker_inspect:
    profile: diagnostic
    description: "Inspect a container's configuration and state (JSON)."
    argv: ["docker", "inspect", "{container}"]
    args:
      container:
        type: string
        required: true
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
        description: "Container name or id."

  docker_stats:
    profile: diagnostic
    description: "One-shot resource usage snapshot per running container."
    argv: ["docker", "stats", "--no-stream", "--format", "{{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}"]

  docker_top:
    profile: diagnostic
    description: "Processes running inside a container."
    argv: ["docker", "top", "{container}"]
    args:
      container:
        type: string
        required: true
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
        description: "Container name or id."

  docker_images:
    profile: diagnostic
    description: "Locally available images (repo:tag, size, id)."
    argv: ["docker", "images", "--format", "{{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.ID}}"]

  docker_system_df:
    profile: diagnostic
    description: "Docker disk usage (images, containers, volumes)."
    argv: ["docker", "system", "df"]

  # ---- Elevated examples — NOT exposed at the default 'diagnostic' profile.
  #      (For everyday read-only service status prefer the cross-OS `service_status`
  #      above; this remains as the profile-gating example.)
  systemctl_status:
    profile: elevated
    description: "Status of a systemd service (Linux/systemd only). Elevated example; prefer the cross-OS `service_status` at the diagnostic profile."
    platform:
      Linux: ["systemctl", "status", "--no-pager", "{unit}"]
    args:
      unit:
        type: string
        required: true
        pattern: "^[A-Za-z0-9@._-]+$"
        description: "systemd unit name, e.g. nginx.service."
