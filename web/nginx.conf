# Serves the static `ask` web surface and reverse-proxies the API to the proxy
# service over the compose network — so the browser sees a single origin
# (no CORS, no proxy code changes). SSE needs buffering OFF and long timeouts.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Required because we proxy_pass via a variable
    # (runtime resolution) so nginx can start even before `proxy` is up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # The proxy service, resolvable on the docker-compose network.
    set $proxy_upstream "http://proxy:8765";

    # Don't let the browser cache the app shell — otherwise a rebuilt index.html /
    # app.js / styles.css silently serves stale until a hard reload.
    add_header Cache-Control "no-cache" always;

    # The heavy vendored libs (mermaid ~3MB, etc.) are pinned and rarely change —
    # cache them long. (A location with its own add_header doesn't inherit the
    # server-level one, so this overrides the no-cache above.)
    location /vendor/ {
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + health → the LLM-PROXY. Regex location passes the full URI through.
    location ~ ^/(v1|healthz) {
        proxy_pass $proxy_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Streaming (SSE) essentials.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
