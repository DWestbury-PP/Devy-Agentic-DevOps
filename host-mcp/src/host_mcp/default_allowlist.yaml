# Default safe-allowlist for the Agentic DevOps host MCP.
#
# Each check is a fixed argv (or per-platform argv). Arguments can only fill a
# whole {placeholder} token, after passing their constraints — there is NO shell
# and NO arbitrary execution. `profile` is the MINIMUM profile required to expose
# the check; the server runs at one active profile (read-only < diagnostic <
# elevated) and exposes only the checks at or below it.
#
# This is the SecOps boundary: the agent can read host + Docker health, sweep
# logs, and run common diagnostics — but it can never get a shell, and the
# Docker checks are read-only (no run/exec/rm/stop). Mutating or shell-granting
# commands are deliberately absent.

profile: diagnostic

checks:
  # ---- Host: read-only --------------------------------------------------
  disk:
    profile: read-only
    description: "Disk usage per filesystem (df -h)."
    argv: ["df", "-h"]

  memory:
    profile: read-only
    description: "Memory usage."
    platform:
      Linux: ["free", "-h"]
      Darwin: ["vm_stat"]

  cpu_load:
    profile: read-only
    description: "System load averages and uptime."
    argv: ["uptime"]

  os_info:
    profile: read-only
    description: "OS / kernel identification."
    platform:
      Linux: ["uname", "-a"]
      Darwin: ["sw_vers"]

  network:
    profile: read-only
    description: "Listening TCP/UDP sockets (no process names; no root needed)."
    platform:
      Linux: ["ss", "-tuln"]
      Darwin: ["netstat", "-an", "-p", "tcp"]

  reboot_history:
    profile: read-only
    description: "Recent reboot / shutdown history (last reboot) — when the host last restarted and whether shutdowns were clean. Portable: `last -n {lines} reboot` on both Linux and macOS."
    argv: ["last", "-n", "{lines}", "reboot"]
    args:
      lines:
        type: int
        default: 10
        min: 1
        max: 100
        description: "Number of recent reboot/shutdown records to return."

  # ---- Host: diagnostic -------------------------------------------------
  processes:
    profile: diagnostic
    description: "Processes sorted by CPU usage."
    platform:
      Linux: ["ps", "-eo", "pid,ppid,%cpu,%mem,comm", "--sort=-%cpu"]
      Darwin: ["ps", "-Ao", "pid,ppid,%cpu,%mem,comm", "-r"]

  top_snapshot:
    profile: diagnostic
    description: "One-shot snapshot of top processes (not streaming)."
    platform:
      Linux: ["top", "-bn1"]
      Darwin: ["top", "-l", "1", "-n", "20"]

  journal:
    profile: diagnostic
    description: "Recent system log entries — systemd journal on Linux, the unified log (log show) on macOS."
    platform:
      Linux: ["journalctl", "--no-pager", "-n", "{lines}"]
      Darwin: ["log", "show", "--last", "5m", "--style", "compact"]
    args:
      lines:
        type: int
        default: 100
        min: 1
        max: 1000
        description: "Number of recent lines (Linux; on macOS the last few minutes are returned)."

  journal_unit:
    profile: diagnostic
    description: "Recent journal entries for one systemd unit (log sweep; Linux/systemd only)."
    platform:
      Linux: ["journalctl", "--no-pager", "-n", "{lines}", "-u", "{unit}"]
    args:
      unit:
        type: string
        required: true
        pattern: "^[A-Za-z0-9@._-]+$"
        description: "systemd unit, e.g. nginx.service."
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Number of recent lines."

  journal_grep:
    profile: diagnostic
    description: "Search recent system logs for a pattern — journald on Linux, /var/log/system.log on macOS. Pattern is passed as a single argument, never a shell. NOTE: on macOS /var/log/system.log has short retention; for historical or richer queries use log_query (the unified-log store)."
    platform:
      Linux: ["journalctl", "--no-pager", "-n", "{lines}", "--grep", "{pattern}"]
      Darwin: ["grep", "-i", "-m", "{lines}", "-e", "{pattern}", "/var/log/system.log"]
    args:
      pattern:
        type: string
        required: true
        pattern: "^[^\\n]{1,120}$"
        description: "Text/regex to grep for (max 120 chars, single line)."
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Max matching lines to return."

  # ---- Linux journald native filters (indexed, server-side) — the surgical,
  #      cheap way to pull an incident slice on a production host. Linux-only;
  #      macOS uses log_query (below) with a scoped predicate.
  journal_priority:
    profile: diagnostic
    description: "Recent journal entries at or above a severity — e.g. errors only. Filtered server-side by journald (indexed), so it's far cheaper than pulling everything and scanning. Linux/systemd only."
    platform:
      Linux: ["journalctl", "--no-pager", "-p", "{priority}", "-n", "{lines}"]
    args:
      priority:
        type: string
        default: "err"
        enum: ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
        description: "Lowest severity to include (err = errors and worse; warning includes warnings)."
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Max entries to return."

  journal_kernel:
    profile: diagnostic
    description: "Kernel messages only (OOM kills, hardware faults, watchdog, filesystem) from the journal — like dmesg. The first place to look for a crash or resource kill. Linux/systemd only."
    platform:
      Linux: ["journalctl", "--no-pager", "-k", "-n", "{lines}"]
    args:
      lines:
        type: int
        default: 200
        min: 1
        max: 2000
        description: "Max entries to return."

  journal_boot:
    profile: diagnostic
    description: "Journal entries from a specific boot — default the PREVIOUS boot (-1), filtered to warnings-and-worse — for investigating what happened just before a reboot or crash. Linux/systemd only."
    platform:
      Linux: ["journalctl", "--no-pager", "-b", "{boot}", "-p", "{priority}", "-n", "{lines}"]
    args:
      boot:
        type: string
        default: "-1"
        pattern: "^(0|-[1-9][0-9]?)$"
        description: "Boot offset: 0 = current boot, -1 = previous boot, -2 = two boots ago."
      priority:
        type: string
        default: "warning"
        enum: ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
        description: "Lowest severity to include (default warning keeps the prior-boot slice small)."
      lines:
        type: int
        default: 300
        min: 1
        max: 3000
        description: "Max entries to return."

  # ---- macOS unified log (log show) — the binary store with far longer
  #      retention than /var/log/system.log. Darwin-only by design; Linux hosts
  #      use the journal / journal_* checks above.
  log_query:
    profile: diagnostic
    # `log show` can scan a lot for wide windows, so give it a generous timeout.
    timeout: 90
    description: "Query the macOS unified log store (`log show`) with an NSPredicate over a time window — the authoritative source for shutdown/reboot cause, power, sleep/wake, and kernel events, with much longer retention than /var/log/system.log. macOS only. The predicate is passed as a single argument (no shell). Example predicate for a shutdown investigation: eventMessage CONTAINS[c] \"shutdown\" OR eventMessage CONTAINS[c] \"Previous shutdown cause\" OR eventMessage CONTAINS[c] \"panic\""
    platform:
      Darwin: ["log", "show", "--last", "{window}", "--predicate", "{predicate}", "--style", "compact"]
    args:
      predicate:
        type: string
        required: true
        pattern: "^[^\\n\\r]{1,200}$"
        description: "An NSPredicate filter, e.g. 'eventMessage CONTAINS[c] \"shutdown\"' or 'process == \"kernel\"'. Single line, max 200 chars. Passed as one argument to log show — never a shell."
      window:
        type: string
        default: "1h"
        pattern: "^\\d+[smhd]$"
        description: "How far back to scan, e.g. 30m, 2h, 3d. Wider windows are slower and may time out (the log store is large)."

  panic_reports:
    profile: read-only
    description: "List recent macOS diagnostic reports (kernel panics, crashes) newest-first from /Library/Logs/DiagnosticReports. A *.panic (or *.ips) file dated near a reboot is strong evidence of an unclean shutdown. macOS only."
    platform:
      Darwin: ["ls", "-lt", "/Library/Logs/DiagnosticReports"]

  # ---- Docker: diagnostic (read-only; requires docker.sock access) ------
  docker_ps:
    profile: diagnostic
    description: "Running containers (name, status, image)."
    argv: ["docker", "ps", "--format", "{{.Names}}\t{{.Status}}\t{{.Image}}"]

  docker_ps_all:
    profile: diagnostic
    description: "All containers including stopped (name, status, image)."
    argv: ["docker", "ps", "-a", "--format", "{{.Names}}\t{{.Status}}\t{{.Image}}"]

  docker_logs:
    profile: diagnostic
    description: "Recent logs for a named container."
    argv: ["docker", "logs", "--tail", "{tail}", "--since", "{since}", "{container}"]
    args:
      container:
        type: string
        required: true
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
        description: "Container name or id."
      since:
        type: string
        default: "15m"
        pattern: "^(\\d+[smhdw]|\\d{4}-\\d{2}-\\d{2}.*)$"
        description: "Time window, e.g. 15m, 1h, 2d."
      tail:
        type: int
        default: 200
        min: 1
        max: 1000
        description: "Max log lines."

  docker_inspect:
    profile: diagnostic
    description: "Inspect a container's configuration and state (JSON)."
    argv: ["docker", "inspect", "{container}"]
    args:
      container:
        type: string
        required: true
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
        description: "Container name or id."

  docker_stats:
    profile: diagnostic
    description: "One-shot resource usage snapshot per running container."
    argv: ["docker", "stats", "--no-stream", "--format", "{{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}"]

  docker_top:
    profile: diagnostic
    description: "Processes running inside a container."
    argv: ["docker", "top", "{container}"]
    args:
      container:
        type: string
        required: true
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
        description: "Container name or id."

  docker_images:
    profile: diagnostic
    description: "Locally available images (repo:tag, size, id)."
    argv: ["docker", "images", "--format", "{{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.ID}}"]

  docker_system_df:
    profile: diagnostic
    description: "Docker disk usage (images, containers, volumes)."
    argv: ["docker", "system", "df"]

  # ---- Elevated examples — NOT exposed at the default 'diagnostic' profile.
  systemctl_status:
    profile: elevated
    description: "Status of a systemd service (Linux/systemd only)."
    platform:
      Linux: ["systemctl", "status", "--no-pager", "{unit}"]
    args:
      unit:
        type: string
        required: true
        pattern: "^[A-Za-z0-9@._-]+$"
        description: "systemd unit name, e.g. nginx.service."
