<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attachment too large</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center; padding: 24px;
      font-family: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      color: #d6ded8;
      background: radial-gradient(1200px 600px at 50% -12%, #16201b 0%, #0c100e 60%, #070908 100%) #0c100e;
    }
    .wrap {
      width: min(520px, 100%); text-align: center;
      background: #141a16; border: 1px solid #232b26; border-left: 3px solid #2c8a5d;
      border-radius: 12px; padding: 40px 32px;
    }
    .mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border: 1px solid #2c8a5d; border-radius: 9px;
      color: #46c98a; font-weight: 700; font-size: 18px; margin-bottom: 18px;
      text-shadow: 0 0 2px rgba(70, 201, 138, 0.35);
    }
    .code { font-size: 64px; font-weight: 600; color: #34423a; line-height: 1; margin-bottom: 6px; }
    h1 { color: #46c98a; font-size: 20px; margin: 0 0 10px; text-shadow: 0 0 2px rgba(70, 201, 138, 0.25); }
    p { color: #8b9890; font-size: 13.5px; line-height: 1.6; margin: 0 auto 22px; max-width: 400px; }
    .btn {
      display: inline-block; text-decoration: none; font-size: 13px; font-weight: 700;
      color: #04140c; background: #2c8a5d; border-radius: 8px; padding: 9px 18px;
      transition: background 0.15s;
    }
    .btn:hover { background: #46c98a; box-shadow: 0 0 2px rgba(70, 201, 138, 0.5); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark">&gt;_</div>
    <div class="code">413</div>
    <h1>That attachment is too large</h1>
    <p>Images sent to Devy are capped at <strong>25&nbsp;MB</strong> per request.
       Try a smaller screenshot, or crop it before attaching.</p>
    <a class="btn" href="/">Back to Devy</a>
  </main>
</body>
</html>
