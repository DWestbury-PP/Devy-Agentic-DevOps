# LLM-PROXY service.
#
#   docker compose up -d --build      # build + start
#   docker compose down               # stop
#   docker compose logs -f            # follow logs
#
# Config and secrets are read from a mounted config directory (defaults to your
# ~/.config/agentic-devops). Put config.yaml and .env there — the same files the
# native install uses. Override the location with AGENTIC_DEVOPS_CONFIG_DIR.
#
# HOST_MCP_TOKEN (bearer token shared by the proxy and host-mcp) is read from a
# .env file in THIS directory (compose's default env file). Generate one with:
#   echo "HOST_MCP_TOKEN=$(openssl rand -hex 24)" >> .env

services:
  proxy:
    build: .
    image: agentic-devops-proxy
    container_name: agentic-devops-proxy
    # Bind to host loopback only — not exposed on the network.
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      # Lets config.yaml reference the host MCP token as ${HOST_MCP_TOKEN}.
      HOST_MCP_TOKEN: ${HOST_MCP_TOKEN:-}
      # Postgres DSN. Defaults to the bundled `postgres` service below; point it
      # at a managed instance (RDS/Aurora) to bind an existing DB instead — then
      # you can skip the bundled service (see its note).
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentic:agentic@postgres:5432/agentic}
      # Secrets backend (Phase S-1). Local compose = dev: secrets live in the
      # bundled LocalStack Secrets Manager (boto3 reads AWS_* / AWS_ENDPOINT_URL
      # from env). The UI can set + test secrets; writes mirror to
      # /config/secrets-store.json and re-hydrate LocalStack on boot (survives
      # restarts). For PROD: set DEVY_MODE=prod, drop these AWS_* vars and the
      # localstack service — boto3 then hits real AWS SM via the instance IAM role.
      DEVY_MODE: ${DEVY_MODE:-dev}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - "${AGENTIC_DEVOPS_CONFIG_DIR:-${HOME}/.config/agentic-devops}:/config"
      # Generated component docs (Phase D-2). A durable bind mount, NOT the
      # ephemeral container overlay FS — the docs Devy authors survive restarts
      # and are inspectable/editable on the host. Matches the default
      # knowledge.docgen_output_dir ("docs-corpus", relative to WORKDIR /app).
      - "${AGENTIC_DEVOPS_DOCS_DIR:-./docs-corpus}:/app/docs-corpus"
    depends_on:
      host-mcp:
        condition: service_healthy
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/healthz').getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Postgres + pgvector — persistence for both subsystems: conversation history
  # (sessions) and the knowledge base (chunks + embeddings). The bootstrap schema
  # is applied automatically on first init (mounted into the init dir); it creates
  # the `vector` extension and the tables. Data persists in a named volume.
  #
  # BIND AN EXISTING / MANAGED DB INSTEAD: set DATABASE_URL to your endpoint, run
  # `agentic-devops db init` once against it, and start only the other services
  # (e.g. `docker compose up -d proxy host-mcp chat-ui`). This bundled service is
  # the zero-setup default; a managed DB is the clean production upgrade.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentic-devops-postgres
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
      POSTGRES_DB: agentic
    volumes:
      - "agentic-pgdata:/var/lib/postgresql/data"
      - "./src/agentic_devops/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Secrets + blob backend for DEV: LocalStack emulating AWS Secrets Manager (S-1)
  # and S3 (attachments), so the resolve/store paths are identical to prod (real
  # AWS SM + S3). Community tier doesn't persist across restarts — fine for secrets
  # (the proxy mirrors + re-hydrates); attachment blobs are dev/test-ephemeral.
  # PROD omits this service entirely (DEVY_MODE=prod → real AWS SM + S3 via IAM).
  localstack:
    image: localstack/localstack:3
    container_name: agentic-devops-localstack
    environment:
      SERVICES: secretsmanager,s3   # secrets + attachment blob store
      DEBUG: ${LOCALSTACK_DEBUG:-0}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"secretsmanager\": \"available\"\\|\"secretsmanager\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # The deployable host MCP, containerized for the local demo. The host's Docker
  # socket is mounted in (read-only), so the allow-listed docker_* checks see the
  # host's real containers. Served over authenticated streamable-HTTP on the
  # compose network only (no host port). The proxy mounts it via `mcp_servers`
  # in config.yaml (see config.example.yaml).
  #
  # SECURITY: the boundary is the ALLOWLIST, not the socket mode — only read-only
  # docker checks are exposed (no run/exec/rm), and there is no shell. host-level
  # checks (df/ps) reflect THIS container; deploy natively for true host view.
  host-mcp:
    build: ./host-mcp
    image: agentic-devops-host-mcp
    container_name: agentic-devops-host-mcp
    environment:
      HOST_MCP_TRANSPORT: http
      HOST_MCP_PROFILE: diagnostic
      HOST_MCP_TOKEN: ${HOST_MCP_TOKEN:-}
      # Timed audit (check, args, argv, exit, duration_ms) per call — the
      # observability you want on a real host ("which diagnostic cost 25s?").
      # Inspect: docker exec agentic-devops-host-mcp cat /tmp/host-mcp-audit.jsonl
      HOST_MCP_AUDIT: ${HOST_MCP_AUDIT:-/tmp/host-mcp-audit.jsonl}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(s.connect_ex(('localhost',8780)))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Grafana MCP — the official Grafana observability MCP server (grafana/mcp-grafana),
  # mounted as a reference read-only observability adapter. This is the "rich
  # external suite -> MOUNT" case (vs. building native): PromQL/LogQL queries,
  # dashboards, datasources, alerting, Sift/incidents — a large, Grafana-maintained
  # surface that tracks upstream for free.
  #
  # SECRETS: the Grafana service-account TOKEN is NOT set here. mcp-grafana runs in
  # header-auth mode (no token in env), so the proxy forwards the vault-mastered
  # token (secret_ref `devy/grafana/token`, set on the admin Secrets tab) on each
  # request and mcp-grafana uses it to reach Grafana. NOTE: mcp-grafana reads the
  # token from the `X-Grafana-Api-Key` header, NOT `Authorization: Bearer` — so the
  # MCP registry row must set Auth header = X-Grafana-Api-Key. One credential,
  # nothing secret in this file or the sidecar's env. Only GRAFANA_URL (your tenant,
  # not secret) is configured — set it in the repo-root .env.
  #
  # READ-ONLY, doubly enforced: `-disable-write` here (server drops all create/update
  # tools) AND the S-4 registry mounts with allow_writes=false (proxy side). Register
  # it on the admin MCP tab pointing at http://grafana-mcp:8000/mcp — see
  # docs/extending.md. Served on the compose network only (no host port).
  grafana-mcp:
    image: mcp/grafana:latest
    container_name: agentic-devops-grafana-mcp
    environment:
      GRAFANA_URL: ${GRAFANA_URL:-}
    command:
      - "-t"
      - "streamable-http"
      - "-address"
      - "0.0.0.0:8000"
      - "-endpoint-path"
      - "/mcp"
      # The proxy dials us by the compose service name, so allow that Host value
      # (the default only permits loopback variants of --address).
      - "-allowed-hosts"
      - "grafana-mcp:8000"
      # Read-only: drop every create/update tool at the source.
      - "-disable-write"
    restart: unless-stopped

  # Phase 5 RCA showcase (opt-in): a "faulty" worker that exhausts its DB pool
  # and OOM crash-loops, so Devy can investigate a real running container live
  # (host MCP docker_ps/logs/inspect/stats) and cross-reference the platform
  # runbook. Start it with:  docker compose --profile demo up -d demo-faulty
  demo-faulty:
    image: busybox:1.36
    container_name: agentic-devops-demo-faulty
    profiles: ["demo"]
    volumes:
      - "./demo/faulty-worker.sh:/faulty-worker.sh:ro"
    command: ["sh", "/faulty-worker.sh"]
    restart: on-failure

  # The web `ask` surface: static terminal-themed UI on nginx, which also
  # reverse-proxies /v1 + /healthz to the proxy (same origin → no CORS).
  # Open http://127.0.0.1:8080 once both are up.
  chat-ui:
    build: ./web
    image: agentic-devops-chat-ui
    container_name: agentic-devops-chat-ui
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agentic-pgdata:
